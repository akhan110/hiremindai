name: hiremind_ai
description: HireMind AI - AI-Powered Candidate Ranking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  http: ^1.2.0
  file_picker: ^8.0.3
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  dotted_border: ^2.1.0
  syncfusion_flutter_pdf: ^25.1.41
  url_launcher: ^6.3.2
  open_filex: ^4.7.0
  universal_html: ^2.3.0
  font_awesome_flutter: ^10.9.1
  device_info_plus: ^12.4.0
  flutter_markdown: ^0.7.7+1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
